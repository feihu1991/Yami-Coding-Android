name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - run: chmod +x gradlew
    - name: Build Android APK
      run: ./gradlew :androidApp:assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"
    - uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: androidApp/build/outputs/apk/**/*.apk

  build-desktop:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - run: chmod +x gradlew
    - run: ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
    - uses: actions/upload-artifact@v4
      with:
        name: desktop-distribution
        path: desktopApp/build/compose/binaries/main/distributions/*
