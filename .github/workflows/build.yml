name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  GRADLE_OPTS: "-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - run: chmod +x gradlew
    - run: ./gradlew :androidApp:assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: androidApp/build/outputs/apk/**/*.apk

  build-desktop:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - run: chmod +x gradlew
    - run: ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: desktop-distribution
        path: desktopApp/build/compose/binaries/main/distributions/*
